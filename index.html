<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="hero">
            <div class="logo-icon" aria-hidden="true">
                <span class="logo-square sq-1"></span>
                <span class="logo-square sq-2"></span>
                <span class="logo-square sq-3"></span>
                <span class="logo-square sq-4"></span>
            </div>
            <div>
                <h1 class="logo-title">
                    <span class="logo-tag">Pixel</span>
                    <span class="logo-name">Art Maker</span>
                </h1>
                <p class="subtitle">Create a grid, choose a color, and draw simple pixel art.</p>
            </div>
        </header>

        <section class="app-box">
            <div class="controls">
                <h2>Controls</h2>

                <div class="input-group">
                    <label for="inputHeight">Grid Height</label>
                    <input type="number" id="inputHeight" value="16" min="1" max="64" step="1">
                </div>

                <div class="input-group">
                    <label for="inputWidth">Grid Width</label>
                    <input type="number" id="inputWidth" value="16" min="1" max="64" step="1">
                </div>

                <div class="input-group">
                    <label for="colorPicker">Choose Color</label>
                    <div class="color-row">
                        <input type="color" id="colorPicker" value="#1f6feb">
                        <span id="colorValue">#1F6FEB</span>
                        <button id="randomColorButton" type="button" class="small-btn">Random</button>
                    </div>
                </div>

                <div class="button-row">
                    <button id="submitButton" type="button">Create Grid</button>
                    <button id="clearButton" type="button" class="secondary-btn">Clear Grid</button>
                    <button id="fillButton" type="button" class="secondary-btn">Fill All</button>
                </div>

                <div class="button-row">
                    <button id="saveButton" type="button" class="secondary-btn">Save Art</button>
                    <button id="loadButton" type="button" class="secondary-btn">Load Art</button>
                    <button id="gridLineButton" type="button" class="secondary-btn">Hide Lines</button>
                </div>

                <p id="gridStatus">16 x 16 grid ready</p>
            </div>

            <div class="canvas-wrapper">
                <div class="canvas-header">
                    <h2>Drawing Board</h2>
                    <p>Tip: click and drag to draw faster.</p>
                </div>
                <table id="pixelCanvas" aria-label="Pixel art drawing canvas"></table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
